<head>

<title>Piment Rouge</title>

<style>
*{

header{

}

padding:15px;

}

}

section{
padding:20px;
}

button{
background:red;
color:white;

}

button:hover{
background:#ff3333;
}

input{
width:100%;

}

.galerie{
display:grid;

}

.galerie img{
width:100%;
border-radius:10px;
}

footer{

text-align:center;
padding:20px;
margin-top:30px;
}
</style>

</head>
