<head>

footer{

</head>
<body>

<header>

<nav>
 <div id="ageVerification" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;z-index:9999;">

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piment-rouge</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

header{
    background:#000;
    padding:20px;
    box-shadow:0 0 15px red;
}

h1{
    color:red;
    font-size:42px;
}

button{
    background:red;
    color:white;
    border:none;
    padding:15px 30px;
    margin:10px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#ff3333;
}

.gallery{
    display:none;
    padding:20px;
}

.gallery img,#galerie img{
    width:220px;
    border-radius:12px;
    margin:10px;
}

#age{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#111;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}
</style>
</head>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

// Remplace ces informations par celles de TON projet Firebase
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJET.firebaseapp.com",
  projectId: "TON_PROJET",
  storageBucket: "TON_PROJET.firebasestorage.app",
  messagingSenderId: "TON_SENDER_ID",
  appId: "TON_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.inscription = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("message").innerText = "Compte créé avec succès !";
    })
    .catch((error) => {
      document.getElementById("message").innerText = error.message;
    });
};

window.connexion = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("message").innerText = "Connexion réussie !";
    })
    .catch((error) => {
      document.getElementById("message").innerText = error.message;
    });
};

window.connexionGoogle = function () {
  signInWithPopup(auth, provider)
    .then(() => {
      document.getElementById("message").innerText = "Connecté avec Google !";
    })
    .catch((error) => {
      document.getElementById("message").innerText = error.message;
    });
};

window.deconnexion = function () {
  signOut(auth).then(() => {
    document.getElementById("message").innerText = "Déconnecté.";
  });
};

window.accepterAge = function () {
  document.getElementById("ageVerification").style.display = "none";
};

window.refuserAge = function () {
  window.location.href = "https://www.google.com";
};

 </script>


<div id="age">
<h2>🔞 Accès réservé aux adultes</h2>
<p>Vous devez avoir 18 ans ou plus.</p>

<button onclick="entrer()">J'ai 18 ans ou plus</button>
<button onclick="window.location='https://google.com'">Quitter</button>
</div>

<div id="site" style="display:none;">
